stages:
  - test
  - lint

install-tree:
  stage: test
  image: debian:latest
  script:
    - apt-get update -qq
    - apt-get install -y tree curl wget iputils-ping dnsutils
    - tree --version
    - curl -k https://keycloak.sam.com
    - ping -c 3 keycloak.sam.com
    - dig +short keycloak.sam.com

hadolint:
  stage: lint
  image: hadolint/hadolint:latest-alpine
  script:
    - |
      echo "=== Hadolint Report ===" | tee hadolint-report.txt
      echo "Date: $(date -u)" | tee -a hadolint-report.txt
      echo "" | tee -a hadolint-report.txt

      FILES=$(find . -name "Dockerfile*" -not -path "*/.git/*")

      if [ -z "$FILES" ]; then
        echo "No Dockerfile found." | tee -a hadolint-report.txt
        exit 0
      fi

      ERRORS=0
      for f in $FILES; do
        echo "--- $f ---" | tee -a hadolint-report.txt
        if ! hadolint "$f" | tee -a hadolint-report.txt; then
          ERRORS=$((ERRORS + 1))
        fi
        echo "" | tee -a hadolint-report.txt
      done

      echo "=== $ERRORS file(s) with issues ===" | tee -a hadolint-report.txt
      exit $ERRORS
  artifacts:
    name: "hadolint-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - hadolint-report.txt
    when: always
    expire_in: 1 week
  allow_failure: true

